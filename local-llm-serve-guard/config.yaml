# Local LLM Serve Guard Configuration

vram:
  poll_interval_seconds: 2
  threshold_percent: 85        # Queue new requests above this
  critical_percent: 95         # Reject requests above this

admission:
  max_queue_size: 50
  queue_timeout_seconds: 30

backends:
  - name: local-ollama
    url: http://localhost:11434
    priority: 1                # Lower = preferred
    healthcheck_path: /api/tags
    healthcheck_interval_seconds: 10

  - name: remote-ollama
    url: http://localhost:11435
    priority: 2
    healthcheck_path: /api/tags
    healthcheck_interval_seconds: 10

proxy:
  host: 0.0.0.0
  port: 8780

metrics:
  db_path: metrics.db
  retention_hours: 24
