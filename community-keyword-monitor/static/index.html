<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Keyword Monitor</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
    --accent: #6c5ce7;
    --reddit: #ff4500;
    --rss: #f39c12;
    --green: #00b894;
    --red: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }

  button {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 0.85rem; transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { opacity: 0.9; }
  button.sm { padding: 4px 10px; font-size: 0.75rem; }

  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 12px 0; margin-bottom: 16px;
  }
  .controls label { font-size: 0.8rem; color: var(--muted); }
  .controls select, .controls input {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); color: var(--text); font-size: 0.85rem;
  }
  .controls input[type="number"] { width: 80px; }

  .tabs { display: flex; gap: 0; margin-bottom: 16px; }
  .tab {
    padding: 8px 20px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 0.85rem; border-radius: 0;
  }
  .tab:first-child { border-radius: 6px 0 0 6px; }
  .tab:last-child { border-radius: 0 6px 6px 0; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .config-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 20px; display: none;
  }
  .config-panel.open { display: block; }
  .config-panel h3 { font-size: 0.95rem; margin-bottom: 12px; }
  .config-section { margin-bottom: 16px; }
  .config-section h4 { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .config-items { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; font-size: 0.8rem;
  }
  .chip .remove { cursor: pointer; color: var(--red); font-weight: bold; }
  .add-row { display: flex; gap: 6px; }
  .add-row input {
    flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 0.85rem;
  }

  .timeline { display: flex; flex-direction: column; gap: 8px; }
  .match-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; transition: border-color 0.15s;
  }
  .match-card:hover { border-color: var(--accent); }
  .match-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .source-badge {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
    font-weight: 600; text-transform: uppercase;
  }
  .source-badge.reddit { background: var(--reddit); color: #fff; }
  .source-badge.rss { background: var(--rss); color: #fff; }
  .keyword-badge {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
    background: var(--accent); color: #fff;
  }
  .score { margin-left: auto; font-size: 0.8rem; color: var(--muted); }
  .match-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
  .match-title a { color: var(--text); text-decoration: none; }
  .match-title a:hover { color: var(--accent); }
  .match-meta { font-size: 0.75rem; color: var(--muted); }
  .match-snippet {
    font-size: 0.8rem; color: var(--muted); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 8px 20px; font-size: 0.75rem; color: var(--muted);
    display: flex; justify-content: space-between;
  }
  .status-bar .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
  .dot.ok { background: var(--green); }
  .dot.loading { background: var(--rss); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state p { margin-top: 8px; font-size: 0.9rem; }

  @media (max-width: 600px) {
    .controls { flex-direction: column; align-items: stretch; }
    header { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>&#9670;</span> Community Keyword Monitor</h1>
    <div class="header-actions">
      <button onclick="toggleConfig()">Settings</button>
      <button class="primary" onclick="collectAll()">Collect Now</button>
    </div>
  </header>

  <div class="config-panel" id="configPanel">
    <h3>Configuration</h3>
    <div class="config-section">
      <h4>Keywords</h4>
      <div class="config-items" id="keywordItems"></div>
      <div class="add-row">
        <input id="newKeyword" placeholder="Add keyword..." onkeydown="if(event.key==='Enter')addItem('keyword','newKeyword')">
        <button class="sm" onclick="addItem('keyword','newKeyword')">Add</button>
      </div>
    </div>
    <div class="config-section">
      <h4>Subreddits</h4>
      <div class="config-items" id="subredditItems"></div>
      <div class="add-row">
        <input id="newSubreddit" placeholder="Add subreddit..." onkeydown="if(event.key==='Enter')addItem('subreddit','newSubreddit')">
        <button class="sm" onclick="addItem('subreddit','newSubreddit')">Add</button>
      </div>
    </div>
    <div class="config-section">
      <h4>RSS Feeds</h4>
      <div class="config-items" id="rss_feedItems"></div>
      <div class="add-row">
        <input id="newRss_feed" placeholder="Add RSS feed URL..." onkeydown="if(event.key==='Enter')addItem('rss_feed','newRss_feed')">
        <button class="sm" onclick="addItem('rss_feed','newRss_feed')">Add</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-source="" onclick="setSource(this)">All</button>
    <button class="tab" data-source="reddit" onclick="setSource(this)">Reddit</button>
    <button class="tab" data-source="rss" onclick="setSource(this)">RSS</button>
  </div>

  <div class="controls">
    <label>Min Score:
      <input type="number" id="minScore" value="0" min="0" onchange="loadMatches()">
    </label>
    <label>Keyword:
      <select id="keywordFilter" onchange="loadMatches()">
        <option value="">All</option>
      </select>
    </label>
  </div>

  <div id="timeline" class="timeline"></div>
</div>

<div class="status-bar">
  <span><span class="dot ok" id="statusDot"></span><span id="statusText">Ready</span></span>
  <span id="matchCount">0 matches</span>
</div>

<script>
let currentSource = '';

function setStatus(text, loading) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = loading ? 'dot loading' : 'dot ok';
}

function setSource(btn) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  currentSource = btn.dataset.source;
  loadMatches();
}

function timeAgo(dateStr) {
  var now = new Date();
  var d = new Date(dateStr);
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function createEl(tag, className, textContent) {
  var el = document.createElement(tag);
  if (className) el.className = className;
  if (textContent) el.textContent = textContent;
  return el;
}

function buildCard(m) {
  var card = createEl('div', 'match-card');

  var header = createEl('div', 'match-header');
  header.appendChild(createEl('span', 'source-badge ' + m.source_type, m.source_type));
  header.appendChild(createEl('span', 'keyword-badge', m.keyword));
  var scoreEl = createEl('span', 'score', m.score > 0 ? '\u25B2 ' + m.score : '');
  header.appendChild(scoreEl);
  card.appendChild(header);

  var titleDiv = createEl('div', 'match-title');
  var link = document.createElement('a');
  link.href = m.url;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.textContent = m.title;
  titleDiv.appendChild(link);
  card.appendChild(titleDiv);

  if (m.snippet) {
    card.appendChild(createEl('div', 'match-snippet', m.snippet));
  }

  card.appendChild(createEl('div', 'match-meta', m.source_name + ' \u00B7 ' + timeAgo(m.created_at)));
  return card;
}

async function loadMatches() {
  var params = new URLSearchParams();
  if (currentSource) params.set('source', currentSource);
  var minScore = document.getElementById('minScore').value;
  if (parseInt(minScore) > 0) params.set('min_score', minScore);
  var kw = document.getElementById('keywordFilter').value;
  if (kw) params.set('keyword', kw);

  setStatus('Loading...', true);
  try {
    var res = await fetch('/api/matches?' + params);
    var data = await res.json();
    var timeline = document.getElementById('timeline');
    timeline.textContent = '';

    if (data.length === 0) {
      var empty = createEl('div', 'empty-state');
      var p = createEl('p', null, 'No matches found. Click "Collect Now" to fetch data.');
      empty.appendChild(p);
      timeline.appendChild(empty);
    } else {
      data.forEach(function(m) { timeline.appendChild(buildCard(m)); });
    }
    document.getElementById('matchCount').textContent = data.length + ' matches';
    setStatus('Ready', false);
  } catch (e) {
    setStatus('Error loading data', false);
  }
}

async function collectAll() {
  setStatus('Collecting...', true);
  try {
    var res = await fetch('/api/collect/all', { method: 'POST' });
    var data = await res.json();
    var total = (data.reddit && data.reddit.collected || 0) + (data.rss && data.rss.collected || 0);
    setStatus('Collected ' + total + ' new matches', false);
    loadMatches();
    loadConfig();
  } catch (e) {
    setStatus('Collection failed', false);
  }
}

function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('open');
}

function renderChips(containerId, key, values) {
  var container = document.getElementById(containerId);
  container.textContent = '';
  values.forEach(function(v) {
    var chip = createEl('span', 'chip', v + ' ');
    var removeBtn = createEl('span', 'remove', '\u00D7');
    removeBtn.addEventListener('click', function() { removeItem(key, v); });
    chip.appendChild(removeBtn);
    container.appendChild(chip);
  });
}

async function loadConfig() {
  try {
    var res = await fetch('/api/config');
    var data = await res.json();
    renderChips('keywordItems', 'keyword', data.keywords);
    renderChips('subredditItems', 'subreddit', data.subreddits);
    renderChips('rss_feedItems', 'rss_feed', data.rss_feeds);

    var sel = document.getElementById('keywordFilter');
    var current = sel.value;
    sel.textContent = '';
    var allOpt = document.createElement('option');
    allOpt.value = '';
    allOpt.textContent = 'All';
    sel.appendChild(allOpt);
    data.keywords.forEach(function(kw) {
      var opt = document.createElement('option');
      opt.value = kw;
      opt.textContent = kw;
      sel.appendChild(opt);
    });
    sel.value = current;
  } catch (e) {
    console.error('Failed to load config', e);
  }
}

async function addItem(key, inputId) {
  var input = document.getElementById(inputId);
  var value = input.value.trim();
  if (!value) return;
  await fetch('/api/config/' + key + '?value=' + encodeURIComponent(value), { method: 'POST' });
  input.value = '';
  loadConfig();
}

async function removeItem(key, value) {
  await fetch('/api/config/' + key + '?value=' + encodeURIComponent(value), { method: 'DELETE' });
  loadConfig();
}

loadConfig();
loadMatches();
</script>
</body>
</html>
