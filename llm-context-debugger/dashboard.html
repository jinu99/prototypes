<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Context Debugger</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --sys: #b392f0; --user: #58a6ff; --asst: #3fb950;
    --tool: #d29922; --tooldef: #f97583;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; background: var(--bg); color: var(--text); font-size: 13px; }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 14px; color: var(--accent); margin-bottom: 4px; }
  .sidebar-header p { font-size: 11px; color: var(--text-dim); }
  .call-list { flex: 1; overflow-y: auto; padding: 8px; }
  .call-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; }
  .call-item:hover { background: rgba(88,166,255,0.08); }
  .call-item.active { background: rgba(88,166,255,0.12); border-color: var(--accent); }
  .call-item .call-id { font-size: 12px; font-weight: 600; color: var(--accent); }
  .call-item .call-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .call-item .call-bar { display: flex; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 6px; gap: 1px; }
  .call-item .warning-badge { display: inline-block; background: var(--yellow); color: #000; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .sidebar-footer button { flex: 1; padding: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 11px; }
  .sidebar-footer button:hover { border-color: var(--accent); color: var(--accent); }

  /* Main */
  .main { overflow-y: auto; padding: 24px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); }
  .empty-state h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .empty-state code { background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 12px; }

  /* Token bar chart */
  .token-chart { display: flex; flex-direction: column; gap: 8px; }
  .token-row { display: flex; align-items: center; gap: 12px; }
  .token-label { width: 110px; font-size: 12px; text-align: right; }
  .token-bar-container { flex: 1; height: 24px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; position: relative; }
  .token-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; }
  .token-value { font-size: 11px; color: var(--text-dim); width: 100px; text-align: right; }
  .color-system { background: var(--sys); }
  .color-user { background: var(--user); }
  .color-assistant { background: var(--asst); }
  .color-tool { background: var(--tool); }
  .color-tools_definition { background: var(--tooldef); }

  /* Treemap */
  .treemap-container { width: 100%; height: 200px; display: flex; flex-wrap: wrap; gap: 2px; border-radius: 4px; overflow: hidden; }
  .treemap-cell { display: flex; align-items: center; justify-content: center; flex-direction: column; border-radius: 4px; font-size: 11px; color: #fff; font-weight: 600; cursor: default; min-width: 40px; }
  .treemap-cell span { font-size: 10px; font-weight: 400; opacity: 0.8; }

  /* Warnings */
  .warning-box { background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3); border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--yellow); }

  /* Messages table */
  .msg-table { width: 100%; border-collapse: collapse; }
  .msg-table th { text-align: left; font-size: 11px; color: var(--text-dim); padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .msg-table td { padding: 6px 8px; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 12px; vertical-align: top; }
  .msg-table .role-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .role-system .role-badge { background: rgba(179,146,240,0.15); color: var(--sys); }
  .role-user .role-badge { background: rgba(88,166,255,0.15); color: var(--user); }
  .role-assistant .role-badge { background: rgba(63,185,80,0.15); color: var(--asst); }
  .role-tool .role-badge { background: rgba(210,153,34,0.15); color: var(--tool); }
  .msg-preview { max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-dim); }

  /* Diff view */
  .diff-selector { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  .diff-selector select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .diff-selector button { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .diff-added { background: rgba(63,185,80,0.1); border-left: 3px solid var(--green); padding: 6px 10px; margin: 4px 0; border-radius: 0 4px 4px 0; font-size: 12px; }
  .diff-removed { background: rgba(248,81,73,0.1); border-left: 3px solid var(--red); padding: 6px 10px; margin: 4px 0; border-radius: 0 4px 4px 0; font-size: 12px; }
  .diff-stat { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; }
  .diff-stat .plus { color: var(--green); }
  .diff-stat .minus { color: var(--red); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; color: var(--text-dim); font-size: 12px; border-bottom: 2px solid transparent; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Legend */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Context Debugger</h1>
      <p>LLM API Call Analyzer</p>
    </div>
    <div class="call-list" id="callList"></div>
    <div class="sidebar-footer">
      <button onclick="loadDemo()">Load Demo</button>
      <button onclick="refresh()">Refresh</button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <h2>No API calls captured yet</h2>
      <p style="margin-top:8px">Point your OpenAI client to this proxy:</p>
      <p style="margin-top:8px"><code>base_url = "http://localhost:8088/v1"</code></p>
      <p style="margin-top:12px;color:var(--text-dim)">Or click <strong>Load Demo</strong> to see sample data</p>
    </div>
  </div>
</div>

<script>
const COLORS = {
  system: '#b392f0', user: '#58a6ff', assistant: '#3fb950',
  tool: '#d29922', tools_definition: '#f97583'
};
const LABELS = {
  system: 'System', user: 'User', assistant: 'Assistant',
  tool: 'Tool Results', tools_definition: 'Tool Defs'
};

let calls = [];
let selectedId = null;

async function refresh() {
  const res = await fetch('/api/calls');
  calls = await res.json();
  renderSidebar();
  if (selectedId) showCall(selectedId);
  else if (calls.length > 0) showCall(calls[calls.length - 1].id);
  else document.getElementById('emptyState').style.display = '';
}

async function loadDemo() {
  await fetch('/api/demo', { method: 'POST' });
  await refresh();
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = String(s);
  return div.textContent.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/&/g, function(m, offset, str) {
    // Only escape & that aren't already part of an entity
    return '&amp;';
  });
}

// Safer escape: use textContent assignment
function safeEsc(s) {
  const span = document.createElement('span');
  span.textContent = String(s);
  return span.outerHTML.replace(/^<span>/, '').replace(/<\/span>$/, '');
}

function createEl(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(el.style, v);
      } else if (k === 'className') {
        el.className = v;
      } else if (k.startsWith('on')) {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else {
        el.setAttribute(k, v);
      }
    }
  }
  if (children) {
    if (typeof children === 'string') {
      el.textContent = children;
    } else if (Array.isArray(children)) {
      children.forEach(c => { if (c) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    }
  }
  return el;
}

function renderSidebar() {
  const list = document.getElementById('callList');
  list.replaceChildren();
  calls.forEach(c => {
    const total = c.total_tokens;
    const time = new Date(c.timestamp * 1000).toLocaleTimeString();
    const hasWarning = c.warnings.length > 0;

    const item = createEl('div', { className: 'call-item' + (c.id === selectedId ? ' active' : '') });
    item.addEventListener('click', () => showCall(c.id));

    const idSpan = createEl('span', { className: 'call-id' }, '#' + c.id);
    item.appendChild(idSpan);

    if (hasWarning) {
      const badge = createEl('span', { className: 'warning-badge' }, '\u26A0');
      item.appendChild(badge);
    }

    const meta = createEl('div', { className: 'call-meta' }, c.model + ' \u00B7 ' + total + ' tokens \u00B7 ' + time);
    item.appendChild(meta);

    const bar = createEl('div', { className: 'call-bar' });
    Object.entries(c.components).filter(([,v]) => v > 0).forEach(([k,v]) => {
      const seg = createEl('div');
      seg.style.flex = v;
      seg.style.background = COLORS[k];
      bar.appendChild(seg);
    });
    item.appendChild(bar);

    list.appendChild(item);
  });
}

async function showCall(id) {
  selectedId = id;
  renderSidebar();
  const call = calls.find(c => c.id === id);
  if (!call) return;

  const main = document.getElementById('mainContent');
  document.getElementById('emptyState').style.display = 'none';

  const old = document.getElementById('detailContent');
  if (old) old.remove();

  const div = createEl('div', { id: 'detailContent' });

  // Warnings
  call.warnings.forEach(w => {
    const wbox = createEl('div', { className: 'warning-box' });
    wbox.textContent = '\u26A0 ' + w.message;
    div.appendChild(wbox);
  });

  // Tabs
  const tabs = createEl('div', { className: 'tabs' });
  const tabData = [
    { id: 'overview', label: 'Overview' },
    { id: 'messages', label: 'Messages' },
    { id: 'diff', label: 'Diff' }
  ];
  const tabContents = {};
  tabData.forEach((t, i) => {
    const tab = createEl('div', { className: 'tab' + (i === 0 ? ' active' : ''), 'data-tab': t.id }, t.label);
    tab.addEventListener('click', () => {
      tabs.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      Object.values(tabContents).forEach(x => x.classList.remove('active'));
      tab.classList.add('active');
      tabContents[t.id].classList.add('active');
    });
    tabs.appendChild(tab);
  });
  div.appendChild(tabs);

  // --- Overview Tab ---
  const overviewTab = createEl('div', { className: 'tab-content active', id: 'tab-overview' });

  // Bar chart card
  const barCard = createEl('div', { className: 'card' });
  barCard.appendChild(createEl('h3', {}, 'Token Distribution \u2014 Bar Chart'));
  const chart = createEl('div', { className: 'token-chart' });
  const maxTokens = Math.max(...Object.values(call.components), 1);
  Object.entries(call.components).filter(([,v]) => v > 0).forEach(([k,v]) => {
    const pct = (v / call.total_tokens * 100).toFixed(1);
    const barW = (v / maxTokens * 100).toFixed(1);
    const row = createEl('div', { className: 'token-row' });
    const label = createEl('div', { className: 'token-label', style: { color: COLORS[k] } }, LABELS[k]);
    const barContainer = createEl('div', { className: 'token-bar-container' });
    const barFill = createEl('div', { className: 'token-bar color-' + k, style: { width: barW + '%' } });
    barContainer.appendChild(barFill);
    const value = createEl('div', { className: 'token-value' }, v + ' (' + pct + '%)');
    row.appendChild(label);
    row.appendChild(barContainer);
    row.appendChild(value);
    chart.appendChild(row);
  });
  barCard.appendChild(chart);

  // Legend
  const legend = createEl('div', { className: 'legend' });
  Object.entries(COLORS).forEach(([k,c]) => {
    const item = createEl('div', { className: 'legend-item' });
    const dot = createEl('div', { className: 'legend-dot', style: { background: c } });
    item.appendChild(dot);
    item.appendChild(document.createTextNode(LABELS[k]));
    legend.appendChild(item);
  });
  barCard.appendChild(legend);
  overviewTab.appendChild(barCard);

  // Treemap card
  const treemapCard = createEl('div', { className: 'card' });
  treemapCard.appendChild(createEl('h3', {}, 'Token Distribution \u2014 Treemap'));
  const treemap = createEl('div', { className: 'treemap-container' });
  Object.entries(call.components).filter(([,v]) => v > 0).forEach(([k,v]) => {
    const pct = (v / call.total_tokens * 100).toFixed(1);
    const cell = createEl('div', { className: 'treemap-cell', style: { flex: v, background: COLORS[k], minHeight: '60px' } });
    cell.appendChild(document.createTextNode(LABELS[k]));
    cell.appendChild(createEl('span', {}, v + ' (' + pct + '%)'));
    treemap.appendChild(cell);
  });
  treemapCard.appendChild(treemap);
  overviewTab.appendChild(treemapCard);

  // Summary card
  const summaryCard = createEl('div', { className: 'card' });
  summaryCard.appendChild(createEl('h3', {}, 'Summary'));
  const grid = createEl('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '12px', fontSize: '12px' } });
  [['Model', call.model], ['Total Tokens', call.total_tokens], ['Messages', call.messages.length]].forEach(([label, val]) => {
    const cell = createEl('div');
    cell.appendChild(document.createTextNode(label));
    cell.appendChild(document.createElement('br'));
    const strong = createEl('strong', { style: { fontSize: '16px' } }, String(val));
    cell.appendChild(strong);
    grid.appendChild(cell);
  });
  summaryCard.appendChild(grid);
  overviewTab.appendChild(summaryCard);
  tabContents['overview'] = overviewTab;
  div.appendChild(overviewTab);

  // --- Messages Tab ---
  const messagesTab = createEl('div', { className: 'tab-content', id: 'tab-messages' });
  const msgCard = createEl('div', { className: 'card' });
  msgCard.appendChild(createEl('h3', {}, 'Message Breakdown'));
  const table = createEl('table', { className: 'msg-table' });
  const thead = createEl('thead');
  const headerRow = createEl('tr');
  ['#', 'Role', 'Tokens', 'Preview'].forEach(h => headerRow.appendChild(createEl('th', {}, h)));
  thead.appendChild(headerRow);
  table.appendChild(thead);
  const tbody = createEl('tbody');
  call.messages.forEach(m => {
    const tr = createEl('tr', { className: 'role-' + m.role });
    tr.appendChild(createEl('td', {}, String(m.index)));
    const roleTd = createEl('td');
    roleTd.appendChild(createEl('span', { className: 'role-badge' }, m.role));
    tr.appendChild(roleTd);
    tr.appendChild(createEl('td', {}, String(m.tokens)));
    const previewTd = createEl('td');
    const previewDiv = createEl('div', { className: 'msg-preview' }, m.preview);
    previewTd.appendChild(previewDiv);
    tr.appendChild(previewTd);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  msgCard.appendChild(table);
  messagesTab.appendChild(msgCard);
  tabContents['messages'] = messagesTab;
  div.appendChild(messagesTab);

  // --- Diff Tab ---
  const diffTab = createEl('div', { className: 'tab-content', id: 'tab-diff' });
  const diffCard = createEl('div', { className: 'card' });
  diffCard.appendChild(createEl('h3', {}, 'Context Diff'));
  const otherCalls = calls.filter(c => c.id !== id);
  if (otherCalls.length > 0) {
    const selector = createEl('div', { className: 'diff-selector' });
    selector.appendChild(createEl('span', {}, 'Compare #' + id + ' with'));
    const select = createEl('select', { id: 'diffTarget' });
    otherCalls.forEach(c => {
      const opt = createEl('option', { value: c.id }, '#' + c.id + ' (' + c.total_tokens + ' tokens)');
      select.appendChild(opt);
    });
    selector.appendChild(select);
    const btn = createEl('button', {}, 'Compare');
    btn.addEventListener('click', () => loadDiff(id));
    selector.appendChild(btn);
    diffCard.appendChild(selector);
    diffCard.appendChild(createEl('div', { id: 'diffResult' }));
  } else {
    diffCard.appendChild(createEl('p', { style: { color: 'var(--text-dim)' } }, 'Need at least 2 calls to compare.'));
  }
  diffTab.appendChild(diffCard);
  tabContents['diff'] = diffTab;
  div.appendChild(diffTab);

  main.appendChild(div);
}

async function loadDiff(currentId) {
  const targetId = parseInt(document.getElementById('diffTarget').value);
  const res = await fetch('/api/diff/' + currentId + '/' + targetId);
  const diff = await res.json();
  const container = document.getElementById('diffResult');
  container.replaceChildren();

  const totalDelta = diff.total_after - diff.total_before;
  const deltaStr = totalDelta >= 0 ? '+' + totalDelta : String(totalDelta);

  const stat = createEl('div', { className: 'diff-stat' });
  stat.appendChild(createEl('span', {}, 'Total: ' + diff.total_before + ' \u2192 ' + diff.total_after + ' (' + deltaStr + ')'));
  Object.entries(diff.component_diff).filter(([,v]) => v.delta !== 0).forEach(([k,v]) => {
    const sign = v.delta > 0 ? '+' : '';
    const cls = v.delta > 0 ? 'plus' : 'minus';
    stat.appendChild(createEl('span', { className: cls }, LABELS[k] + ': ' + sign + v.delta));
  });
  container.appendChild(stat);

  if (diff.added.length > 0) {
    container.appendChild(createEl('h4', { style: { fontSize: '12px', color: 'var(--green)', margin: '8px 0' } }, 'Added Messages'));
    diff.added.forEach(m => {
      const d = createEl('div', { className: 'diff-added' });
      d.textContent = '+ [' + m.role + '] ' + m.preview + ' (' + m.tokens + ' tokens)';
      container.appendChild(d);
    });
  }
  if (diff.removed.length > 0) {
    container.appendChild(createEl('h4', { style: { fontSize: '12px', color: 'var(--red)', margin: '8px 0' } }, 'Removed Messages'));
    diff.removed.forEach(m => {
      const d = createEl('div', { className: 'diff-removed' });
      d.textContent = '- [' + m.role + '] ' + m.preview + ' (' + m.tokens + ' tokens)';
      container.appendChild(d);
    });
  }
  container.appendChild(createEl('p', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '8px' } }, diff.unchanged_count + ' messages unchanged'));
}

// Auto-refresh every 2 seconds
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
